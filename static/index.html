<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civic Desk — Issue Reporter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="desk">

  <header class="masthead">
    <span class="eyebrow">Local Reporting Desk</span>
    <h1>File a report</h1>
    <p class="sub">Tell us what's broken. We'll route it to the right department automatically.</p>
  </header>

  <section class="intake">
    <div class="field">
      <label for="name">Your name</label>
      <input id="name" placeholder="e.g. Asha Patil" autocomplete="off">
    </div>
    <div class="field">
      <label for="desc">What's going on?</label>
      <textarea id="desc" placeholder="Describe the issue — mention 'road', 'light' or 'water' and we'll tag it for you" rows="3"></textarea>
    </div>
    <button class="submit-btn" onclick="addIssue()">
      <span>Submit report</span>
    </button>
    <p id="form-msg" class="form-msg"></p>
  </section>

  <section class="board">
    <div class="board-head">
      <h2>Reports</h2>
      <span class="count" id="count">0 total</span>
    </div>

    <div class="filters" id="status-filters">
      <button class="pill active" data-status="All" onclick="setStatusFilter('All')">All</button>
      <button class="pill" data-status="Open" onclick="setStatusFilter('Open')">Open</button>
      <button class="pill" data-status="Closed" onclick="setStatusFilter('Closed')">Closed</button>
    </div>

    <div class="filters" id="tag-filters">
      <button class="pill active" data-tag="All" onclick="setTagFilter('All')">All tags</button>
      <button class="pill" data-tag="Road" onclick="setTagFilter('Road')">Road</button>
      <button class="pill" data-tag="Electricity" onclick="setTagFilter('Electricity')">Electricity</button>
      <button class="pill" data-tag="Water" onclick="setTagFilter('Water')">Water</button>
      <button class="pill" data-tag="General" onclick="setTagFilter('General')">General</button>
    </div>

    <ul id="list" class="ticket-list"></ul>
    <p id="empty" class="empty-state" hidden>Nothing here. Once a report matches this filter, it'll show up as a ticket.</p>
  </section>

</div>

<script>
const API = "http://127.0.0.1:5000";
let currentTagFilter = "All";
let currentStatusFilter = "All";
let allIssues = [];

const TAG_LABEL = {
  Road: "Road",
  Electricity: "Electricity",
  Water: "Water",
  General: "General"
};

async function addIssue() {
  const nameInput = document.getElementById("name");
  const descInput = document.getElementById("desc");
  const msg = document.getElementById("form-msg");

  const name = nameInput.value.trim();
  const description = descInput.value.trim();

  if (!name || !description) {
    msg.textContent = "Both fields are required before we can file this.";
    msg.classList.add("error");
    return;
  }

  msg.textContent = "";
  msg.classList.remove("error");

  await fetch(`${API}/add-issue`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, description })
  });

  nameInput.value = "";
  descInput.value = "";
  msg.textContent = "Filed. It'll appear below shortly.";

  loadIssues();
}

async function deleteIssue(id) {
  await fetch(`${API}/delete-issue/${id}`, { method: "DELETE" });
  loadIssues();
}

async function toggleStatus(id) {
  await fetch(`${API}/toggle-status/${id}`, { method: "PATCH" });
  loadIssues();
}

function setTagFilter(tag) {
  currentTagFilter = tag;
  document.querySelectorAll("#tag-filters .pill").forEach(p => {
    p.classList.toggle("active", p.dataset.tag === tag);
  });
  render();
}

function setStatusFilter(status) {
  currentStatusFilter = status;
  document.querySelectorAll("#status-filters .pill").forEach(p => {
    p.classList.toggle("active", p.dataset.status === status);
  });
  render();
}

function timeAgo(iso) {
  if (!iso) return "";
  const then = new Date(iso.replace(" ", "T") + "Z");
  const diffMin = Math.floor((Date.now() - then.getTime()) / 60000);
  if (diffMin < 1) return "just now";
  if (diffMin < 60) return `${diffMin}m ago`;
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return `${diffHr}h ago`;
  return `${Math.floor(diffHr / 24)}d ago`;
}

function render() {
  const list = document.getElementById("list");
  const empty = document.getElementById("empty");
  const count = document.getElementById("count");

  let visible = allIssues;
  if (currentTagFilter !== "All") {
    visible = visible.filter(i => i.tag === currentTagFilter);
  }
  if (currentStatusFilter !== "All") {
    visible = visible.filter(i => (i.status || "Open") === currentStatusFilter);
  }

  count.textContent = `${allIssues.length} total`;
  list.innerHTML = "";

  if (visible.length === 0) {
    empty.hidden = false;
    return;
  }
  empty.hidden = true;

  visible.forEach((issue, idx) => {
    const li = document.createElement("li");
    const status = issue.status || "Open";
    li.className = `ticket${status === "Closed" ? " ticket-closed" : ""}`;
    li.style.animationDelay = `${idx * 40}ms`;

    const tagClass = (issue.tag || "General").toLowerCase();

    li.innerHTML = `
      <div class="ticket-top">
        <span class="ticket-no">#${String(issue.id).padStart(4, "0")}</span>
        <div class="ticket-top-right">
          <span class="status-dot status-${status.toLowerCase()}"></span>
          <span class="status-label">${status}</span>
          <span class="tag tag-${tagClass}">${TAG_LABEL[issue.tag] || "General"}</span>
        </div>
      </div>
      <h3 class="ticket-name">${escapeHtml(issue.name)}</h3>
      <p class="ticket-desc">${escapeHtml(issue.description)}</p>
      <div class="ticket-bottom">
        <span class="ticket-time">${timeAgo(issue.created_at)}</span>
        <div class="ticket-actions">
          <button class="ticket-toggle" onclick="toggleStatus(${issue.id})">
            ${status === "Open" ? "Mark closed" : "Reopen"}
          </button>
          <button class="ticket-delete" onclick="deleteIssue(${issue.id})" aria-label="Delete report">Delete</button>
        </div>
      </div>
    `;
    list.appendChild(li);
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

async function loadIssues() {
  const res = await fetch(`${API}/issues`);
  allIssues = await res.json();
  render();
}

loadIssues();
setInterval(loadIssues, 3000);
</script>

</body>
</html>
